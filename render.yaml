services:
  # Backend Web Service
  - type: web
    name: shiv-travel-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app"
    envVars:
      - key: DATABASE_URL
        sync: false # You will set this in the Render Dashboard or keep from .env if possible
      - key: PORT
        value: 10000 # Render's default port for web services
    rootContext: backend

  # Frontend Static Site
  - type: static_site
    name: shiv-travel-frontend
    env: static
    buildCommand: "npm install && npm run build"
    publishPath: "dist"
    rootContext: "react-frontend"
    routes:
      - type: rewrite
        source: "/api/*"
        destination: "https://shive-travel-backend.onrender.com/api/*"
      - type: rewrite
        source: "/*"
        destination: "/index.html"
