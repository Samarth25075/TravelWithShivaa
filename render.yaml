services:
  # Backend Web Service
  - type: web
    name: shiv-travel-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app"
    envVars:
      - key: MONGODB_URL
        sync: false # Set your MongoDB Atlas connection string here
      - key: APP_ENV
        value: "production"
      - key: PORT
        value: 10000 
    rootContext: backend

  # Frontend Static Site
  - type: static_site
    name: shiv-travel-frontend
    env: static
    buildCommand: "npm install && npm run build"
    publishPath: "dist"
    rootContext: "react-frontend"
    headers:
      - path: "/*"
        headers:
          - key: "Cache-Control"
            value: "public, max-age=31536000"
    routes:
      # Rewrites frontend API calls to the backend service
      - type: rewrite
        source: "/api/*"
        destination: "https://shiv-travel-backend.onrender.com/api/*"
      # Fallback for React Router SPA navigation
      - type: rewrite
        source: "/*"
        destination: "/index.html"
